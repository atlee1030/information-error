<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error of Information - Home</title>
    <link rel="stylesheet" href="https://use.typekit.net/ufh5wxj.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Oxanium:wght@300;400;500;600;700&display=swap">
    <link rel="stylesheet" href="panel-nav.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="panel-nav.js" defer></script>
    <script src="supabase-config.js" defer></script>
    <script src="social-issues-store.js" defer></script>

    <style>
        body { 
            margin: 0; padding: 0; overflow: hidden; 
            background-color: #e1e1de; font-family: "oxanium", sans-serif; font-weight: 400;
        }
        header {
            position: absolute; width: 100%; top: 0; left: 0; 
            display: flex; justify-content: space-between; padding: clamp(14px, 2.4vw, 40px); 
            box-sizing: border-box; z-index: 10; pointer-events: none;
        }
        .logo { font-size: clamp(18px, 2.1vw, 36px); color: black; text-decoration: none; pointer-events: auto; }
        nav { display: flex; gap: clamp(14px, 2vw, 40px); pointer-events: auto; }
        nav a { font-size: clamp(15px, 1.4vw, 24px); color: black; text-decoration: none; cursor: pointer; position: relative; transition: opacity 0.3s; }
        nav a:hover { opacity: 0.5; }

        @media (max-width: 900px) {
            header {
                padding: 18px 16px;
            }

            .logo {
                font-size: 22px;
            }

            nav {
                gap: 18px;
            }

            nav a {
                font-size: 18px;
            }
        }

        @media (max-width: 560px) {
            .logo {
                font-size: 18px;
            }

            nav a {
                font-size: 15px;
            }
        }

        /* ★ 중앙 입력창 스타일 */
        #input-wrapper {
            position: absolute; top: 50%; left: 50%; 
            transform: translate(-50%, -50%); z-index: 20; 
            text-align: center; display: flex; gap: 0;
            transition: opacity 0.5s ease;
        }
        #user-input {
            background: rgba(200, 200, 198, 0.7); /* 와이어프레임 느낌의 회색 */
            border: none; padding: 12px 20px; font-family: "oxanium"; 
            font-size: 16px; width: 250px; outline: none;
        }
        #add-btn {
            background: #000; color: #fff; border: none; 
            padding: 12px 20px; font-family: "oxanium"; 
            cursor: pointer; transition: background 0.2s;
        }
        #add-btn:hover { background: #333; }

        .fade-out { opacity: 0; transition: opacity 0.8s ease; }
    </style>
</head>
<body data-panel-page="" data-panel-nav="off">

    <header id="main-header">
        <a href="index.html" class="logo">Error of Information</a>
        <nav>
            <a onclick="handleTransition('project1.html')">Project 1</a>
            <a onclick="handleTransition('project2.html')">Project 2</a>
        </nav>
    </header>

    <div id="input-wrapper">
        <input type="text" id="user-input" placeholder="Type a Social Issue..." maxlength="30">
        <button id="add-btn" onclick="addNewWord()">ADD</button>
    </div>

    <script src="sketch.js"></script>

    <script>
        function handleTransition(url) {
            document.getElementById('main-header').classList.add('fade-out');
            document.getElementById('input-wrapper').classList.add('fade-out'); // 입력창도 같이 페이드아웃
            if (typeof startTransition === 'function') {
                startTransition(url);
            } else {
                window.location.href = url;
            }
        }

        // ★ 단어 추가 핸들러
        async function addNewWord() {
            const input = document.getElementById('user-input');
            const word = input.value.trim();
            if (word !== "") {
                if (typeof addWordToSketch === 'function') {
                    await addWordToSketch(word); // sketch.js 내부 함수 호출
                    input.value = ""; // 입력창 초기화
                }
            }
        }

        // 엔터키 입력 지원
        document.getElementById('user-input').addEventListener('keypress', async function(e) {
            if (e.key === 'Enter') await addNewWord();
        });
    </script>
</body>
</html>
