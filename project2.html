<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project 2</title>
    <link rel="stylesheet" href="https://use.typekit.net/ufh5wxj.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Oxanium:wght@300;400;500;600;700&display=swap">
    <link rel="stylesheet" href="panel-nav.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <script src="panel-nav.js" defer></script>
    <script src="how-they-are-used-graph.js" defer></script>
    <style>
        :root {
            --bg: rgb(218, 210, 199);
            --frame-pad: 0px;
            --frame-left-column: 0px;
            --frame-right-column: 0px;
            --frame-top-row: 58px;
            --frame-bottom-row: 40px;
            --stage-ratio: 1.5556;
            --stage-safety: 0px;
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            margin: 0;
            overflow-x: hidden;
            min-height: 100vh;
        }

        body {
            background: var(--bg);
            color: #232323;
            font-family: "oxanium", sans-serif;
        }

        header {
            position: absolute;
            width: 100%;
            top: 0;
            left: 0;
            display: flex;
            justify-content: space-between;
            padding: clamp(14px, 2.4vw, 40px);
            box-sizing: border-box;
            z-index: 120;
            pointer-events: none;
        }

        .logo {
            font-size: clamp(18px, 2.1vw, 36px);
            color: black;
            text-decoration: none;
            pointer-events: auto;
        }

        nav {
            display: flex;
            gap: clamp(14px, 2vw, 40px);
            pointer-events: auto;
        }

        nav a {
            font-size: clamp(15px, 1.4vw, 24px);
            color: black;
            text-decoration: none;
            transition: opacity 0.3s;
        }

        nav a:hover {
            opacity: 0.5;
        }

        .active {
            border-bottom: 2px solid black;
        }


        @media (max-width: 900px) {
            header {
                padding: 18px 16px;
            }

            .logo {
                font-size: 22px;
            }

            nav {
                gap: 18px;
            }

            nav a {
                font-size: 18px;
            }
        }

        @media (max-width: 560px) {
            .logo {
                font-size: 18px;
            }

            nav a {
                font-size: 15px;
            }
        }

        .page {
            min-height: 100vh;
            padding:
                calc(var(--frame-pad) + var(--frame-top-row) + var(--stage-safety))
                calc(var(--frame-pad) + var(--frame-right-column) + var(--stage-safety))
                calc(var(--frame-pad) + var(--frame-bottom-row) + var(--stage-safety))
                calc(var(--frame-pad) + var(--frame-left-column) + var(--stage-safety));
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        .stage-wrap {
            position: relative;
            width: min(
                calc(100vw - (var(--frame-left-column) + var(--frame-right-column) + (var(--frame-pad) * 2) + (var(--stage-safety) * 2))),
                calc((100vh - (var(--frame-top-row) + var(--frame-bottom-row) + (var(--frame-pad) * 2) + (var(--stage-safety) * 2))) * var(--stage-ratio))
            );
            height: min(
                calc(100vh - (var(--frame-top-row) + var(--frame-bottom-row) + (var(--frame-pad) * 2) + (var(--stage-safety) * 2))),
                calc((100vw - (var(--frame-left-column) + var(--frame-right-column) + (var(--frame-pad) * 2) + (var(--stage-safety) * 2))) / var(--stage-ratio))
            );
            min-height: 0;
            overflow: hidden;
        }

        #usage-graph-canvas {
            position: absolute;
            inset: 0;
        }

        #usage-graph-canvas canvas {
            display: block;
            width: 100% !important;
            height: 100% !important;
        }

        @media (max-width: 1180px) {
            :root {
                --frame-bottom-row: 72px;
            }
        }

        @media (max-width: 900px) {
            :root {
                --frame-pad: 0px;
                --frame-left-column: 0px;
                --frame-right-column: 0px;
                --frame-top-row: 66px;
                --frame-bottom-row: 0px;
                --stage-safety: 8px;
            }

            .page {
                padding: calc(var(--frame-top-row) + var(--stage-safety)) 8px 96px;
            }

            .stage-wrap {
                width: 100%;
                height: min(58vh, 520px);
                min-height: 360px;
            }
        }
    </style>
</head>
<body data-panel-page="">
    <header>
        <a href="index.html" class="logo">Error of Information</a>
        <nav>
            <a href="project1.html">Project 1</a>
            <a href="project2.html" class="active">Project 2</a>
        </nav>
    </header>

    <main class="page">
        <section class="stage-wrap" aria-label="Project 2 landing graph">
            <div
                id="usage-graph-canvas"
                data-design-width="1400"
                data-design-height="900"
                data-visual-scale="1.04"
                data-graph-scale-max="1.26"
                data-graph-shift-x="0"
                data-graph-shift-y="-34"
                data-text-scale-min="0.76"
                data-text-scale-max="1.06"
                data-center-text-scale-min="0.44"
                data-center-text-scale-max="1.02"
                data-category-text-size="14"
                data-item-text-size="12"
                data-responsive-breakpoint="1720"
                data-responsive-min-factor="0.7"
                data-mobile-breakpoint="900"
                data-mobile-visual-scale="0.68"
                data-mobile-graph-scale-max="0.72"
                data-mobile-graph-shift-x="0"
                data-mobile-graph-shift-y="-8"
                data-mobile-text-scale-min="0.56"
                data-mobile-text-scale-max="0.82"
                data-mobile-center-text-scale-min="0.26"
                data-mobile-center-text-scale-max="0.54"
                data-mobile-category-text-size="10.2"
                data-mobile-item-text-size="9.4"
                data-mobile-responsive-min-factor="0.62"
                data-mobile-center-spread-max="1.34"
            ></div>
        </section>
    </main>
</body>
</html>
